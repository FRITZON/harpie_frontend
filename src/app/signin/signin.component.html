<div class="login-container">
  <div class="login-card">
    <h2>Login to your Account</h2>
    <p>Welcome back! To continue where you left off, log in to your account 😊</p>
    <form #signinForm="ngForm" (ngSubmit)="onSubmit(signinForm)">
      <input type="email" placeholder="Email" class="form-control" [(ngModel)]="email" name="email" required />
      <div *ngIf="signinForm.submitted && signinForm.controls['email']?.invalid" class="invalid-feedback">
        <div *ngIf="signinForm.controls['email']?.errors?.['required']">Email is required</div>
        <div *ngIf="signinForm.controls['email']?.errors?.['email']">Email must be a valid email address</div>
      </div>
      
      <div class="password-container">
        <input type="password" placeholder="Password" class="form-control" [(ngModel)]="password" name="password" minlength="6" required />
        <div *ngIf="signinForm.submitted && signinForm.controls['password']?.invalid" class="invalid-feedback">
          <div *ngIf="signinForm.controls['password']?.errors?.['required']">Password is required</div>
          <div *ngIf="signinForm.controls['password']?.errors?.['minlength']">Password must be at least 6 characters long</div>
        </div>
        <a href="#">Forgot Password?</a>
      </div>
      
      <button type="submit" class="sign-in-btn" [disabled]="signinForm.invalid">Sign In</button>
    </form>
    
    <div class="separator">OR</div>
    <div class="social-buttons">
      <button class="facebook-btn">Sign in with Facebook</button>
      <button class="linkedin-btn">Sign in with LinkedIn</button>
      <button class="google-btn">Sign in with Google</button>
    </div>
    
    <p class="signup-text">You don't have an account yet? <a href="#">Sign Up</a></p>
  </div>
</div>
